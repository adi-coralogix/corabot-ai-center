# Optional: host-based routing + TLS when you have an Ingress controller (e.g. AWS ALB Ingress).
# Each frontend also has its own **Service type LoadBalancer** (internet-facing NLB, port 80) — see
# chat-team-*.yaml. Use `kubectl get svc -n ai-agent-sim` or `.logs/eks-frontend-public-urls.log` after deploy.
# Two hostnames — one per Coralogix team instance (matched RUM + OTLP via collector ports).
# Set rules[].host to real DNS (or /etc/hosts) before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: svelte-chatbot
  namespace: ai-agent-sim
  labels:
    app: svelte-chatbot
  annotations:
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - host: chat-team-a.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chat-backend-team-a
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-frontend-team-a
                port:
                  number: 3000
    - host: chat-team-b.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chat-backend-team-b
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-frontend-team-b
                port:
                  number: 3000
