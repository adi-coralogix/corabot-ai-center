services:
  # ── Observability collector ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      CORALOGIX_PRIVATE_KEY: ${CORALOGIX_PRIVATE_KEY}
    # No host ports — only reachable by other compose services on the internal network.
    # Local dev: use `npm run api` + `npm run dev` (Vite proxies /api to :8000).
    restart: unless-stopped

  # ── FastAPI chat backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORALOGIX_GUARDRAILS_KEY: ${CORALOGIX_GUARDRAILS_KEY}
      CX_GUARDRAILS_ENDPOINT: ${CX_GUARDRAILS_ENDPOINT:-https://api.cx498.coralogix.com/api/v1/guardrails/guard}
      GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-false}
      GUARDRAIL_DEMO_PROBABILITY: ${GUARDRAIL_DEMO_PROBABILITY:-0.03}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
    # No host ports — the frontend SSR server proxies /api/* internally via CHAT_API_ORIGIN.
    depends_on:
      - otel-collector
    restart: unless-stopped

  # ── SvelteKit frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_CORALOGIX_RUM_KEY: ${VITE_CORALOGIX_RUM_KEY}
        # VITE_CHAT_API_URL is intentionally unset — the browser sends /api/* as a
        # same-origin relative path, which hooks.server.ts proxies to CHAT_API_ORIGIN.
    environment:
      PUBLIC_CORALOGIX_RUM_KEY: ${VITE_CORALOGIX_RUM_KEY}
      PUBLIC_CORALOGIX_DOMAIN: ${PUBLIC_CORALOGIX_DOMAIN:-US2}
      # Tells hooks.server.ts to proxy /api/* to the backend container (internal network).
      CHAT_API_ORIGIN: http://backend:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: corabot-ai-center
    depends_on:
      - backend
      - otel-collector
    restart: unless-stopped

  # ── Synthetic RUM traffic generator ─────────────────────────────────────
  # Puppeteer loop hitting the frontend directly (bypasses oauth2-proxy).
  # Sends a full session every RUM_HARNESS_INTERVAL_MS (default 5 min).
  rum-harness:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.harness
    environment:
      BASE_URL: http://frontend:3000
      # Blank out the K8s team URLs baked into the image so the loop runs
      # single-instance mode against the local frontend container.
      BASE_URL_TEAM_A: ""
      BASE_URL_TEAM_B: ""
      RUM_HARNESS_CHAT_TIMEOUT_MS: "120000"
      RUM_HARNESS_NAV_TIMEOUT_MS: "60000"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Google OAuth2 gate (@coralogix.com only) ─────────────────────────────
  # oauth2-proxy is the public entry point on port 80.
  # CloudFront sits in front and handles TLS (*.cloudfront.net HTTPS URL).
  # --reverse-proxy tells oauth2-proxy to trust the X-Forwarded-Proto: https
  # header that CloudFront injects, so cookies are set correctly.
  # Only accounts with an @coralogix.com Google email are let through.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.2
    ports:
      - "80:4180"
    command:
      - --provider=google
      - --email-domain=coralogix.com
      - --upstream=http://frontend:3000
      - --http-address=0.0.0.0:4180
      - --redirect-url=https://${DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-name=_corabot_auth
      - --cookie-expire=8h
      - --pass-access-token=false
      - --skip-provider-button=true
      - --reverse-proxy=true
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    depends_on:
      - frontend
    restart: unless-stopped
