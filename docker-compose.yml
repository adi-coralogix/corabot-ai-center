services:
  # ── Observability collector ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      CORALOGIX_PRIVATE_KEY: ${CORALOGIX_PRIVATE_KEY}
    # No host ports — only reachable by other compose services on the internal network.
    # Local dev: use `npm run api` + `npm run dev` (Vite proxies /api to :8000).
    restart: unless-stopped

  # ── FastAPI chat backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORALOGIX_GUARDRAILS_KEY: ${CORALOGIX_GUARDRAILS_KEY}
      CX_GUARDRAILS_ENDPOINT: ${CX_GUARDRAILS_ENDPOINT:-https://api.coralogix.com/api/v1/guardrails/guard}
      GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-false}
      GUARDRAIL_DEMO_PROBABILITY: ${GUARDRAIL_DEMO_PROBABILITY:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    # No host ports — the frontend SSR server proxies /api/* internally via CHAT_API_ORIGIN.
    depends_on:
      - otel-collector
    restart: unless-stopped

  # ── SvelteKit frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_CORALOGIX_RUM_KEY: ${VITE_CORALOGIX_RUM_KEY}
        # VITE_CHAT_API_URL is intentionally unset — the browser sends /api/* as a
        # same-origin relative path, which hooks.server.ts proxies to CHAT_API_ORIGIN.
    environment:
      PUBLIC_CORALOGIX_RUM_KEY: ${VITE_CORALOGIX_RUM_KEY}
      PUBLIC_CORALOGIX_DOMAIN: ${PUBLIC_CORALOGIX_DOMAIN:-US2}
      # Tells hooks.server.ts to proxy /api/* to the backend container (internal network).
      CHAT_API_ORIGIN: http://backend:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      - backend
      - otel-collector
    restart: unless-stopped

  # ── Google OAuth2 gate (@coralogix.com only) ─────────────────────────────
  # oauth2-proxy sits between Caddy and the frontend.
  # Unauthenticated requests are redirected to Google Sign-In; only accounts
  # with an @coralogix.com email are allowed through.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7
    command:
      - --provider=google
      - --email-domain=coralogix.com
      - --upstream=http://frontend:3000
      - --http-address=0.0.0.0:4180
      - --redirect-url=https://${DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-name=_corabot_auth
      - --cookie-expire=8h
      - --pass-access-token=false
      - --skip-provider-button=true
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    depends_on:
      - frontend
    restart: unless-stopped

  # ── TLS termination + HTTP→HTTPS redirect ───────────────────────────────
  # Caddy auto-provisions and renews Let's Encrypt certificates.
  # DOMAIN is read from the .env file at runtime via Caddy's {$DOMAIN} syntax.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - oauth2-proxy
    restart: unless-stopped

volumes:
  caddy_data:   # persists Let's Encrypt certificates across container restarts
  caddy_config:
