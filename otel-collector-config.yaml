# Coralogix OTEL collector config (adapted for local macOS - journald/systemd removed)
connectors:
  forward/compact: {}
  forward/db: {}
  forward/db_compact: {}
  spanmetrics:
    aggregation_cardinality_limit: 100000
    dimensions:
      - name: http.method
      - name: cgx.transaction
      - name: cgx.transaction.root
      - name: status_code
      - name: db.namespace
      - name: db.operation.name
      - name: db.collection.name
      - name: db.system
      - name: http.response.status_code
      - name: rpc.grpc.status_code
      - name: service.version
    histogram:
      explicit:
        buckets:
          - 1ms
          - 4ms
          - 10ms
          - 20ms
          - 50ms
          - 100ms
          - 200ms
          - 500ms
          - 1s
          - 2s
          - 5s
      unit: ms
    metrics_expiration: 5m
    metrics_flush_interval: 30s
    namespace: ""
  spanmetrics/compact:
    aggregation_cardinality_limit: 100000
    exclude_dimensions:
      - span.name
    histogram:
      explicit:
        buckets:
          - 1ms
          - 4ms
          - 10ms
          - 20ms
          - 50ms
          - 100ms
          - 200ms
          - 500ms
          - 1s
          - 2s
          - 5s
      unit: ms
    metrics_expiration: 5m
    metrics_flush_interval: 30s
    namespace: compact
  spanmetrics/db:
    aggregation_cardinality_limit: 100000
    dimensions:
      - name: db.namespace
      - name: db.operation.name
      - name: db.collection.name
      - name: db.system
      - name: service.version
    histogram:
      explicit:
        buckets:
          - 1ms
          - 4ms
          - 10ms
          - 20ms
          - 50ms
          - 100ms
          - 200ms
          - 500ms
          - 1s
          - 2s
          - 5s
      unit: ms
    metrics_expiration: 5m
    metrics_flush_interval: 30s
    namespace: db
  spanmetrics/db_compact:
    aggregation_cardinality_limit: 100000
    dimensions:
      - name: db.namespace
      - name: db.system
    exclude_dimensions:
      - span.name
      - span.kind
    histogram:
      explicit:
        buckets:
          - 1ms
          - 4ms
          - 10ms
          - 20ms
          - 50ms
          - 100ms
          - 200ms
          - 500ms
          - 1s
          - 2s
          - 5s
      unit: ms
    metrics_expiration: 5m
    metrics_flush_interval: 30s
    namespace: db_compact

exporters:
  debug:
    verbosity: normal
  # private_key / domain / timeout apply to all signals (traces, metrics, logs) for this exporter.
  # Application/subsystem align with backend/main.py resource (cx.application.name / cx.subsystem.name):
  # application_name=corabot-ai-center, subsystem_name=chat-api (resource attrs cx.application.name / cx.subsystem.name).
  coralogix:
    application_name: corabot-ai-center
    application_name_attributes:
      - cx.application.name
    domain: us2.coralogix.com
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    subsystem_name: chat-api
    subsystem_name_attributes:
      - cx.subsystem.name
    timeout: 30s
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.18
    metrics:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.18
    profiles:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.18
    traces:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.18
  coralogix/resource_catalog:
    application_name: resource
    domain: us2.coralogix.com
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    subsystem_name: catalog
    timeout: 30s
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-standalone/0.0.18
        x-coralogix-ingress: metadata-as-otlp-logs/v1

extensions:
  health_check:
    endpoint: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:13133
  zpages:
    endpoint: localhost:55679
  pprof:
    endpoint: localhost:1777

processors:
  batch:
    send_batch_max_size: 2048
    send_batch_size: 1024
    timeout: 1s
  coralogix:
    transactions:
      enabled: true
  filter/db_compact_spanmetrics:
    traces:
      span:
        - 'kind != SPAN_KIND_CLIENT or attributes["db.namespace"] == nil or attributes["db.system"] == nil'
  filter/db_spanmetrics:
    traces:
      span:
        - 'attributes["db.system"] == nil'
  groupbytrace/transactions:
    wait_duration: 30s
  memory_limiter:
    check_interval: 5s
    limit_mib: ${env:OTEL_MEMORY_LIMIT_MIB:-512}
  redaction/spanname:
    allow_all_keys: true
  resource/metadata:
    attributes:
      - action: upsert
        key: cx.otel_integration.name
        value: coralogix-linux-standalone
  resourcedetection/env:
    detectors:
      - system
      - env
    override: false
    system:
      resource_attributes:
        host.id:
          enabled: true
    timeout: 2s
  transform/compact:
    trace_statements:
      - context: resource
        statements:
          - keep_keys(attributes, ["service.name", "k8s.cluster.name", "host.name", "deployment.environment.name"])
  transform/db_compact:
    trace_statements:
      - context: resource
        statements:
          - keep_keys(attributes, ["service.name", "k8s.cluster.name", "host.name", "deployment.environment.name"])
      - context: span
        statements:
          - keep_keys(attributes, ["db.namespace", "db.system"])
  transform/semconv:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - 'set(attributes["http.method"], attributes["http.request.method"]) where attributes["http.request.method"] != nil'
  transform/spanmetrics:
    error_mode: silent
    metric_statements:
      - context: datapoint
        statements:
          - 'set(attributes["status.code"], "STATUS_CODE_ERROR") where attributes["status.code"] == nil and instrumentation_scope.name == "spanmetricsconnector" and attributes["otel.status_code"] == "ERROR"'
          - 'set(attributes["status.code"], "STATUS_CODE_OK") where attributes["status.code"] == nil and instrumentation_scope.name == "spanmetricsconnector" and attributes["otel.status_code"] == "OK"'
          - 'set(attributes["status.code"], "STATUS_CODE_UNSET") where attributes["status.code"] == nil and instrumentation_scope.name == "spanmetricsconnector" and (attributes["otel.status_code"] == "UNSET" or attributes["otel.status_code"] == nil)'

receivers:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      filesystem:
        exclude_fs_types:
          fs_types:
            - autofs
            - proc
            - sysfs
          match_type: strict
        exclude_mount_points:
          match_type: regexp
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
      load:
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network:
      process:

      processes:

      paging:
      
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_LISTEN_INTERFACE:-0.0.0.0}:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: ${env:OTEL_LISTEN_INTERFACE:-0.0.0.0}:4318
        cors:
          allowed_origins: ["*"]
  prometheus:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector
          scrape_interval: 30s
          static_configs:
            - targets:
                - ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}:8889

service:
  extensions:
    - health_check
    - zpages
    - pprof
  pipelines:
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resourcedetection/env
        - resource/metadata
        - batch
      exporters:
        - coralogix
        - debug
    metrics:
      receivers:
        - hostmetrics
        - spanmetrics
        - spanmetrics/db
        - prometheus
        - otlp
      processors:
        - memory_limiter
        - resourcedetection/env
        - resource/metadata
        - transform/spanmetrics
        - batch
      exporters:
        - coralogix
    metrics/compact:
      receivers:
        - spanmetrics/compact
      processors:
        - memory_limiter
        - batch
      exporters:
        - coralogix
    metrics/db_compact:
      receivers:
        - spanmetrics/db_compact
      processors:
        - memory_limiter
        - batch
      exporters:
        - coralogix
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resourcedetection/env
        - resource/metadata
        - transform/semconv
        - redaction/spanname
        - groupbytrace/transactions
        - coralogix
        - batch
      exporters:
        - spanmetrics
        - forward/db
        - forward/compact
        - forward/db_compact
        - coralogix
    traces/compact:
      receivers:
        - forward/compact
      processors:
        - transform/compact
        - batch
      exporters:
        - spanmetrics/compact
    traces/db:
      receivers:
        - forward/db
      processors:
        - filter/db_spanmetrics
        - batch
      exporters:
        - spanmetrics/db
    traces/db_compact:
      receivers:
        - forward/db_compact
      processors:
        - filter/db_compact_spanmetrics
        - transform/db_compact
        - batch
      exporters:
        - spanmetrics/db_compact
  telemetry:
    logs:
      encoding: json
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:OTEL_LISTEN_INTERFACE:-127.0.0.1}
                port: 8889
